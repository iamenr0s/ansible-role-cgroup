---
cgroup_enforce_mode: "v2"
cgroup_v1_enable_memory: true
cgroup_v1_add_cgroup_memory_param: true
# Force a reboot when the memory cgroup controller is expected (v2 or v1 with
# cgroup_v1_enable_memory) but not detected on the running kernel. Set to
# false to suppress the automatic reboot.
cgroup_force_reboot_on_memcg_absent: true
cgroup_extra_kernel_params: []
# Set to false to disable automatic reboots entirely. Useful in environments
# where reboots must be scheduled manually.
cgroup_allow_reboot: true
